<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Hex a Archivo</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <h1>🔄 Conversor Hex → Archivo</h1>
        <p class="subtitle">Convierte datos hexadecimales a archivo binario. Soporta archivos .txt grandes desde disco.
        </p>

        <!-- Opción 1: Cargar archivo .txt con hex -->
        <div class="input-group">
            <label for="fileInput">📂 Cargar archivo .txt con datos hexadecimales:</label>
            <div class="file-input-wrapper">
                <input type="file" id="fileInput" accept=".txt,.hex,.log" />
                <span class="file-status" id="fileStatus">Ningún archivo seleccionado</span>
            </div>
        </div>

        <!-- Opción 2: Pegar hex manualmente (opcional) -->
        <div class="input-group">
            <label for="hexInput">✏️ O pega los datos hexadecimales aquí (con o sin prefijo 0x):</label>
            <textarea id="hexInput" placeholder="Ejemplo: 0x1F8B0800... o 1F8B0800..."></textarea>
        </div>

        <div class="button-group">
            <button class="btn-convert" id="convertBtn" onclick="convertHex()">Convertir</button>
            <button class="btn-download" id="downloadBtn" onclick="downloadFile()" disabled>Descargar Archivo</button>
        </div>

        <!-- Barra de progreso -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
            <span class="progress-text" id="progressText">0%</span>
        </div>

        <div class="info-box" id="infoBox"></div>
    </div>

    <script src="js/script.js" defer></script>
</body>

</html>
